---
- name: Populate service facts
  ansible.builtin.service_facts:

# ensure mounted boot
- name: Override config.txt location for Raspberry Pi OS version before bookworm
  ansible.builtin.set_fact:
    octoprint_config_dir: /boot
  when: ansible_facts.distribution_major_version | int < 12

- name: Detect boot source from fstab if not already mounted
  ansible.builtin.command:
    cmd: findmnt --fstab --noheadings --output SOURCE {{ octoprint_config_dir }}
  register: _octoprint_boot_fstab
  changed_when: false
  failed_when: false
  check_mode: false
  become: true
  when:
    - '"webcamd.service" in ansible_facts.services'
    - ansible_facts.mounts | selectattr('mount', 'equalto', octoprint_config_dir) | list | length == 0

- name: Mount boot
  ansible.posix.mount:
    path: "{{ octoprint_config_dir }}"
    state: mounted
    src: "{{ _octoprint_boot_fstab.stdout | trim }}"
    fstype: vfat
  when:
    - '"webcamd.service" in ansible_facts.services'
    - ansible_facts.mounts | selectattr('mount', 'equalto', octoprint_config_dir) | list | length == 0
    - _octoprint_boot_fstab.stdout | default('') | trim != ''
  changed_when: false
  become: true

- name: Enable camera_usb_options setting in octopi.txt
  ansible.builtin.lineinfile:
    path: "{{ octoprint_config_dir }}/config.txt"
    regexp: "^camera_usb_options="
    line: 'camera_usb_options="{{ octoprint_camera_usb_options }}"'
  when:
    - octoprint_camera_usb_options is defined
    - '"webcamd.service" in ansible_facts.services'
  become: true

# - name: ensuring ffmpeg for timelapses
#   ansible.builtin.package:
#     name: libav-tools
#     state: present

- name: Disable webcamd to only show webcam while printing
  ansible.builtin.systemd_service:
    name: webcamd.service
    enabled: false
  when: '"webcamd.service" in ansible_facts.services'
  become: true

- name: Deploy sudo permission file for webcamd control
  ansible.builtin.copy:
    src: webcamd-control
    dest: /etc/sudoers.d/webcamd-control
    owner: root
    group: root
    mode: "0644"
    validate: /usr/sbin/visudo -cf %s
  when: '"webcamd.service" in ansible_facts.services'
  become: true

- name: Disable camera-streamer to only show webcam while printing
  ansible.builtin.systemd_service:
    name: camera-streamer.service
    enabled: false
  when: '"camera-streamer.service" in ansible_facts.services'
  become: true

- name: Deploy sudo permission file for webcamd control
  ansible.builtin.copy:
    src: camera-streamer-control
    dest: /etc/sudoers.d/camera-streamer-control
    owner: root
    group: root
    mode: "0644"
    validate: /usr/sbin/visudo -cf %s
  when: '"camera-streamer.service" in ansible_facts.services'
  become: true

- name: Remove legacy timelapse sync script location
  ansible.builtin.file:
    path: /opt/octoprint-timelapse
    state: absent
  become: true

- name: Remove legacy timelapse upload cronjob
  ansible.builtin.cron:
    name: "Sync octoprint timelapses"
    state: absent
  become: true

- name: Deploy octoprint timelapse sync script
  ansible.builtin.template:
    src: octoprint-timelapse-sync.sh.jinja2
    dest: /usr/local/bin/octoprint-timelapse-sync
    owner: root
    group: root
    mode: "0750"
  become: true

- name: Deploy octoprint timelapse sync systemd service
  ansible.builtin.template:
    src: octoprint-timelapse-sync.service.j2
    dest: /etc/systemd/system/octoprint-timelapse-sync.service
    owner: root
    group: root
    mode: "0644"
  become: true
  notify: Reload systemd and restart timelapse timer

- name: Deploy octoprint timelapse sync systemd timer
  ansible.builtin.template:
    src: octoprint-timelapse-sync.timer.j2
    dest: /etc/systemd/system/octoprint-timelapse-sync.timer
    owner: root
    group: root
    mode: "0644"
  become: true
  notify: Reload systemd and restart timelapse timer

- name: Enable and start octoprint timelapse sync timer
  ansible.builtin.systemd_service:
    name: octoprint-timelapse-sync.timer
    enabled: true
    state: started
    daemon_reload: true
  become: true

- name: Ensure backup cronjob
  ansible.builtin.cron:
    name: "Octoprint backup"
    minute: "20"
    hour: "00"
    user: "pi"
    job: "/home/pi/oprint/bin/octoprint plugins backup:backup --exclude uploads --exclude timelapse > /dev/null 2>&1"
  become: true

- name: Ensure backup cleanup cronjob
  ansible.builtin.cron:
    name: "Octoprint backup cleanup"
    minute: "20"
    hour: "01"
    user: "pi"
    job: "/usr/bin/find /home/pi/.octoprint/data/backup/ -type f -iname '*.zip' -mtime +7 -delete > /dev/null"
  become: true

- name: Ensure avrdude for the fwupdater plugin
  ansible.builtin.package:
    name: avrdude
    state: present
  become: true
